name: Publish Package

on:
  push:
    branches:
      - master

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.20.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  publish-npm:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.20.1
          registry-url: https://registry.npmjs.org/
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Verify publish artifact
        shell: bash
        run: |
          set -euo pipefail
          TARBALL="$(npm pack --silent)"
          tar -tf "$TARBALL" | grep -q '^package/dist/'
          tar -tf "$TARBALL" | grep -q '^package/.agent/'

      - name: Publish package
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
