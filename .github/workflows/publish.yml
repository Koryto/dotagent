name: Publish Package

on:
  push:
    branches:
      - master

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  publish-npm:
    needs: verify
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Build
        run: npm run build

      - name: Verify publish artifact
        shell: bash
        run: |
          set -euo pipefail
          TARBALL="$(npm pack --silent)"
          tar -tf "$TARBALL" > package-contents.txt
          grep -Fq 'package/dist/' package-contents.txt || {
            echo 'Missing dist/ in published tarball'
            cat package-contents.txt
            exit 1
          }
          grep -Fq 'package/.agent/' package-contents.txt || {
            echo 'Missing .agent/ in published tarball'
            cat package-contents.txt
            exit 1
          }

      - name: Check publish necessity
        id: publish-check
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry https://registry.npmjs.org/ >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Package already published: ${PACKAGE_NAME}@${PACKAGE_VERSION}"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        if: steps.publish-check.outputs.publish == 'true'
        run: npm publish --access public --provenance
