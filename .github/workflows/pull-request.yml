name: Pull Request

on:
  pull_request:

concurrency:
  group: pr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20.20.1
          - 22
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  package-smoke:
    name: Package Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.20.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack tarball
        shell: bash
        run: |
          set -euo pipefail
          TARBALL="$(npm pack --silent)"
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"

      - name: Verify packaged contents
        shell: bash
        run: |
          set -euo pipefail
          tar -tf "$TARBALL" > package-contents.txt
          grep -Fq 'package/dist/' package-contents.txt || {
            echo 'Missing dist/ in published tarball'
            cat package-contents.txt
            exit 1
          }
          grep -Fq 'package/.agent/' package-contents.txt || {
            echo 'Missing .agent/ in published tarball'
            cat package-contents.txt
            exit 1
          }

      - name: Install packed CLI into a temp directory
        shell: bash
        run: |
          set -euo pipefail
          TMP_DIR="$(mktemp -d)"
          npm install --prefix "$TMP_DIR" "./$TARBALL"
          "$TMP_DIR/node_modules/.bin/dotagent" --version
